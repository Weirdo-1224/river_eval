experiment:
  name: retro_memory_qwen
  output_dir: results/retro_memory_qwen
  max_samples: 10

dataset:
  annotation_path: annotations/Retro-Memory.json
  video_root: data/videos/RIVER

task:
  name: retro_memory
  max_frames: 16
  frame_resolution: 448

model:
  name: qwen_api
  model: qwen-vl-plus
  temperature: 0
  max_tokens: 16

storage:
  save_raw_output: true
  save_trace: true
  use_cache: true
  cache_dir: auto

cost:
  track: true
  pricing:
    qwen-vl-plus: [0.00050, 0.00050]
    qwen-vl-max: [0.00200, 0.00200]
    gpt-4o: [0.00250, 0.01000]
    gpt-4o-mini: [0.00015, 0.00060]

evaluation:
  metrics: [accuracy]
