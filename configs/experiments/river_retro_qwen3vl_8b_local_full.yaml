experiment:
  name: river_retro_qwen3vl_8b_local_full
  output_dir: results/river_retro_qwen3vl_8b_local_full

dataset:
  name: river_retro_memory
  annotation_path: annotations/Retro-Memory.json
  video_root: data/videos/RIVER
  require_local_video: true

task:
  name: river_retro_memory
  max_frames: 16
  frame_resolution: 448

prompt:
  style: river_longshort

video:
  frame_policy: river_long_short
  max_frames: 16
  frame_resolution: 448
  short_frames: 4
  short_window_sec: 16.0

model:
  name: qwen3vl_local
  model: /home/Datasets/Hf_model/Qwen3-VL-8B-Instruct
  model_path: /home/Datasets/Hf_model/Qwen3-VL-8B-Instruct
  temperature: 0
  max_tokens: 16
  torch_dtype: bfloat16
  device_map: auto
  max_frames: 16
  trust_remote_code: true

storage:
  save_raw_output: true
  save_trace: true
  use_cache: false
  cache_dir: auto
  cache_errors: false
  reuse_failed_cache: false

cost:
  track: false

evaluation:
  scoring: river_mcq_accuracy
  metrics: [accuracy]
